name: Build Windows App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --name "LRCMaker_Backend_Win" --onedir --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --hidden-import faster_whisper api_server.py

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $env:GITHUB_ENV

      - name: Zip Windows Release
        run: |
          Compress-Archive -Path dist\LRCMaker_Backend_Win -DestinationPath LRCMaker-AI-Backend-Windows-${{ env.VERSION }}.zip

      - name: Upload Windows Artifact for Inspection
        uses: actions/upload-artifact@v4
        with:
          name: LRCMaker-AI-Backend-Windows-${{ env.VERSION }}
          path: LRCMaker-AI-Backend-Windows-${{ env.VERSION }}.zip
          retention-days: 7
