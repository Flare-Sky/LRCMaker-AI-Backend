name: Build Windows App

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装核心依赖 (加入防崩溃降级机制)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install "numpy<2"
          
      - name: 🔨 下载并解压 Windows 版 FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg_temp
          move ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe .\
          move ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe .\
        shell: cmd

      - name: ⚔️ 满血合体打包 (加入环境兜底与极限瘦身)
        run: |
          pyinstaller --name "LRCMaker_Backend_Win" --onedir ^
          --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." ^
          --hidden-import faster_whisper ^
          --hidden-import whisper ^
          --hidden-import stable_whisper ^
          --collect-all torch ^
          --exclude-module torch.test ^
          --exclude-module torch.distributions ^
          --exclude-module torch.utils.tensorboard ^
          --exclude-module matplotlib ^
          --exclude-module tkinter ^
          api_server.py
        shell: cmd

      - name: 🧠 云端预下载 AI 模型 (v2.0 纯离线特性)
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Systran/faster-whisper-small', local_dir='dist/LRCMaker_Backend_Win/models/faster-whisper-small')"

      - name: 🗜️ 压缩发布包
        run: |
          Compress-Archive -Path dist\LRCMaker_Backend_Win -DestinationPath LRCMaker-AI-Backend-Windows-${{ github.ref_name }}.zip

      - name: ☁️ 上传产物供后台下载
        uses: actions/upload-artifact@v4
        with:
          name: LRCMaker-AI-Backend-Windows-${{ github.ref_name }}
          path: LRCMaker-AI-Backend-Windows-${{ github.ref_name }}.zip
          retention-days: 7